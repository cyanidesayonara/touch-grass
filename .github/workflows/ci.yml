name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Download Godot
        run: |
          curl -sL -o godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.7-stable_linux.x86_64

      - name: Leash winding regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_wrap.gd

      - name: Headless smoke tests (all levels)
        # Runs each level for 1800 simulated frames (~30s): catches parse
        # errors and runtime script errors in the main gameplay loop.
        run: |
          for LV in street park beach; do
            ./Godot_v4.7-stable_linux.x86_64 --headless --path . --quit-after 1800 -- --level=$LV 2>&1 | tee smoke-$LV.log
            ! grep -E "SCRIPT ERROR|Parse Error|Failed to load script" smoke-$LV.log
          done
