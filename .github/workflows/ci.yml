name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Download Godot
        run: |
          curl -sL -o godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.7-stable_linux.x86_64

      - name: Leash winding regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_wrap.gd

      - name: Critter chase regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_critter_chase.gd

      - name: Tangle event regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_tangle_latch.gd

      - name: Freedom traffic regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_freedom_traffic.gd

      - name: NPC pair direction regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_pair_direction.gd

      - name: Bandana preview regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_bandana_preview.gd

      - name: Owner label regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_owner_label.gd

      - name: Shared bypasser route regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_bypasser_route.gd

      - name: Rider obstacle avoidance regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_rider_avoidance.gd

      - name: NPC pair obstacle avoidance regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_pair_pond_avoidance.gd

      - name: NPC pair park lifecycle regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_pair_park_lifecycle.gd

      - name: NPC pair park slot regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_pair_park_slots.gd

      - name: NPC pair park traffic regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_pair_park_traffic.gd

      - name: Free-dog visual variety regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_free_dog_variety.gd

      - name: NPC pair dog appearance regression test
        run: ./Godot_v4.7-stable_linux.x86_64 --headless --path . --script res://tests/test_pair_dog_appearance.gd

      - name: Headless smoke tests (all levels)
        # Runs each level for 1800 simulated frames (~30s): catches parse
        # errors and runtime script errors in the main gameplay loop.
        run: |
          for LV in street park beach market; do
            ./Godot_v4.7-stable_linux.x86_64 --headless --path . --quit-after 1800 -- --level=$LV 2>&1 | tee smoke-$LV.log
            ! grep -E "SCRIPT ERROR|Parse Error|Failed to load script" smoke-$LV.log
          done

      - name: Full-walk traversal (out -> freedom -> home -> finish)
        # the attract bot walks street end to end; asserts the whole
        # three-leg structure completes without error. --fixed-fps makes
        # frame count map to physics time deterministically.
        run: |
          ./Godot_v4.7-stable_linux.x86_64 --headless --fixed-fps 60 --path . --quit-after 12000 -- --level=street --autowalk 2>&1 | tee walk.log
          ! grep -E "SCRIPT ERROR|Parse Error" walk.log
          grep -q "AUTOWALK FINISHED" walk.log
